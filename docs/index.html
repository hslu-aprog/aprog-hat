<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APROG HAT Documentation</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #333;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin-bottom: 30px;
      font-size: 28px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    a.button {
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .primary {
      background: #0969da;
      color: white;
    }

    .primary:hover {
      background: #0753b3;
    }

    .secondary {
      background: #eaeef2;
      color: #333;
    }

    .secondary:hover {
      background: #d0d7de;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HSLU APROG HAT</h1>

    <div class="buttons">
      <a class="button primary" href="https://github.com/hslu-aprog/aprog-hat" target="_blank">
        Source Files
      </a>

      <a class="button secondary" href="https://hslu-aprog.github.io/aprog-hat/ibom.html" target="_blank">
        IBOM
      </a>
    </div>
  </div>
</body>
</html>
